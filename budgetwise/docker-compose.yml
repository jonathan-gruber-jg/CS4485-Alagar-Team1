services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapp_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  mail-server:
    build:
      context: mail-server
    hostname: mail.budgetwise.local
    ports:
      - "10025:25"
      - "10465:465"
      - "10587:587"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mail-server:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://myapp:secret@db:5432/myapp_db
      JWT_SECRET: budgetwise_dev_secret_9f3a2c1d7e6b5a4c8d1f0e9b2a7c6d5e
      PORT: 5001
      CORS_ORIGIN: http://localhost:10000
      OPENAI_API_KEY: ""
      MOCK_DATA_XLSX: /app/mock-data/personal_transactions_budgetwise_2025_2026.xlsx
      FRONTEND_HOSTNAME: www.budgetwise.local
      MAIL_SERVER_PORT: 10587
      MAIL_SERVER_DOMAIN: budgetwise.local
    ports:
      - "5001:5001"
    volumes:
      - ./backend/mock-data:/app/mock-data:ro

  mock-seed:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://myapp:secret@db:5432/myapp_db
      JWT_SECRET: budgetwise_dev_secret_9f3a2c1d7e6b5a4c8d1f0e9b2a7c6d5e
      CORS_ORIGIN: http://localhost:3000
      MOCK_DATA_XLSX: /app/mock-data/personal_transactions_budgetwise_2025_2026.xlsx
      MOCK_DATA_WIPE: "true"
    volumes:
      - ./backend/mock-data:/app/mock-data:ro
    command: npm run mock:data
    restart: "no"
    profiles: ["tools"]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    hostname: www.budgetwise.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5001
    ports:
      - "10000:10000"

volumes:
  postgres_data:
