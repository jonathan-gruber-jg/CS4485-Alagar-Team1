name: BudgetWise CI

on:
  push:
    branches: [main, docker-setup]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: budgetwise/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: budgetwise/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5001
        run: npm run build

  backend:
    name: Lint and Build Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: budgetwise/backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: budgetwise/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build
